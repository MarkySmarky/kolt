<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff Viewer</title>
    <link rel="stylesheet" href="diff-app.css">
</head>
<body>
    <div id="app">
        <div id="file-tree">
            <div id="file-tree-header">
                <span id="file-count">0 changed files</span>
            </div>
            <div id="file-list"></div>
        </div>
        <div id="divider"></div>
        <div id="diff-view">
            <div id="diff-toolbar">
                <span id="diff-filename"></span>
                <div id="diff-controls">
                    <button id="toggle-view" title="Toggle unified/side-by-side">Unified</button>
                </div>
            </div>
            <div id="diff-content">
                <div id="diff-placeholder">
                    <span class="placeholder-icon">&#8644;</span>
                    <span class="placeholder-text">Select a file to view changes</span>
                </div>
            </div>
        </div>
    </div>
    <script src="diff-app.js"></script>
</body>
</html>
